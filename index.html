  <title>Thomas Fiebig – Edelmetallfachberater</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh; min-height: 100dvh;
      background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(200,168,75,0.07) 0%, transparent 55%),
                  radial-gradient(ellipse at 70% 80%, rgba(200,168,75,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .scene {
      width: min(320px, 86vw);
      height: min(590px, calc(86vw * 1.84));
      position: relative;
    }

    .face {
      position: absolute; inset: 0; border-radius: 18px; overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,0.75), 0 0 0 1px rgba(200,168,75,0.22);
      transition: opacity 0.25s ease, transform 0.4s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
    }

    .front { opacity: 1; transform: scale(1); z-index: 2; }
    .back  { opacity: 0; transform: scale(0.93); z-index: 1; pointer-events: none; }
    .scene.flipped .front { opacity: 0; transform: scale(0.93); z-index: 1; pointer-events: none; }
    .scene.flipped .back  { opacity: 1; transform: scale(1); z-index: 2; pointer-events: auto; }

    /* ── FLIP BUTTON (auf der Karte, unten) ── */
    .flip-bar {
      width: 100%;
      padding: 11px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(200,168,75,0.15);
      border: none;
      outline: none;
      background: transparent;
      border-top: 1px solid rgba(200,168,75,0.2);
      flex-shrink: 0;
      z-index: 20;
    }

    .flip-bar-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c8a84b 0%, #f0d060 50%, #c8a84b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Vorderseite – goldener Hintergrund für flip-bar */
    .front .flip-bar {
      background: rgba(26,18,8,0.12);
      border-top: 1px solid rgba(26,18,8,0.2);
    }
    .front .flip-bar-text {
      background: linear-gradient(135deg, #1a1208 0%, #3a2a10 50%, #1a1208 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.6;
    }
    .front .flip-bar svg path {
      fill: #1a1208;
      opacity: 0.5;
    }

    /* VORDERSEITE Inhalt */
    .front {
      background: linear-gradient(108deg,
        #b8902a 0%, #d4aa40 12%, #f0d868 26%, #f5e888 36%,
        #e8d060 48%, #c09030 60%, #d8b848 72%, #f0d060 82%, #c8a030 100%);
    }
    .front::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255,255,255,0.045) 3px, rgba(255,255,255,0.045) 5px);
      pointer-events: none;
    }
    .front::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 8px, rgba(0,0,0,0.025) 8px, rgba(0,0,0,0.025) 9px);
      pointer-events: none;
    }

    .front-main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 44px 32px 20px;
      position: relative; z-index: 1;
      pointer-events: none;
    }

    .front-content { text-align: center; }
    .signature {
      font-family: 'Dancing Script', cursive; font-weight: 700;
      font-size: clamp(40px, 12vw, 54px); color: #1a1208;
      line-height: 1.05; margin-bottom: 20px;
      text-shadow: 1px 2px 4px rgba(255,255,255,0.25);
    }
    .front-divider {
      width: 55%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,18,8,0.4), transparent);
      margin: 0 auto 18px;
    }
    .title-text {
      font-size: clamp(10px, 2.8vw, 12px);
      letter-spacing: 5px; color: #2a1a08; text-transform: uppercase;
    }

    /* RÜCKSEITE */
    .back {
      background: #0d0d0d;
    }
    .back::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 10%, #201e14 0%, #0d0d0d 60%);
      pointer-events: none; border-radius: 18px;
    }

    .back-main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 28px 26px 20px;
      position: relative; z-index: 1;
      overflow: hidden;
    }

    .gold-text {
      background: linear-gradient(135deg, #c8a84b 0%, #f0d060 30%, #e8c84a 50%, #b8942a 70%, #d4aa40 85%, #f5e070 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .back-top { text-align: center; }
    .monogram {
      font-weight: 300;
      font-size: clamp(46px, 13vw, 58px); letter-spacing: 8px; line-height: 1; margin-bottom: 6px;
    }

    a {
      display: block;
      text-decoration: none;
      touch-action: manipulation;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(200,168,75,0.15);
      position: relative;
      z-index: 10;
    }

    .website-link {
      font-size: clamp(8px, 2.2vw, 10px);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px;
      padding: 4px 0;
    }

    .tap-hint {
      font-size: 7.5px; letter-spacing: 2px;
      color: rgba(200,168,75,0.35); text-transform: uppercase;
      display: block; pointer-events: none;
    }

    .back-mid { text-align: center; width: 100%; }

    .social-row {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 4px;
    }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 10px;
      border: 1px solid rgba(200,168,75,0.35); background: rgba(200,168,75,0.05);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 9px;
    }

    .social-label {
      font-size: 7.5px; letter-spacing: 2px;
      color: rgba(200,168,75,0.35); text-transform: uppercase;
      display: block; margin-bottom: 12px; pointer-events: none;
    }

    .qr-wrap {
      display: inline-flex;
      flex-direction: column; align-items: center; gap: 5px;
      padding: 4px;
    }

    .qr-box {
      width: clamp(82px, 22vw, 96px); height: clamp(82px, 22vw, 96px);
      background: #f5e888; border-radius: 9px; padding: 6px;
      box-shadow: 0 6px 24px rgba(200,168,75,0.28);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }

    .back-bottom { text-align: center; width: 100%; }

    .gold-divider {
      width: 38%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,168,75,0.35), transparent);
      margin: 0 auto 12px; pointer-events: none;
    }

    .phone-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 10px 20px; border-radius: 40px;
      border: 1px solid rgba(200,168,75,0.32); background: rgba(200,168,75,0.05);
      margin-bottom: 4px;
    }

    .phone-label {
      font-size: clamp(9px, 2.5vw, 11px); letter-spacing: 2px; text-transform: uppercase;
      pointer-events: none;
    }

    .email-link {
      font-size: clamp(7px, 2vw, 9px); letter-spacing: 0.4px;
      padding: 4px 0;
    }
  </style>
