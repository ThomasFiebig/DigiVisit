<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; min-height: 100dvh;
  background: #111;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.scene {
  width: min(320px, 86vw);
  height: min(590px, calc(86vw * 1.84));
  position: relative;
}
.face {
  position: absolute; inset: 0; border-radius: 18px; overflow: hidden;
  box-shadow: 0 30px 70px rgba(0,0,0,0.75), 0 0 0 1px rgba(200,168,75,0.3);
  transition: opacity 0.25s ease, transform 0.4s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  background: linear-gradient(108deg,
    #b8902a 0%, #d4aa40 12%, #f0d868 26%, #f5e888 36%,
    #e8d060 48%, #c09030 60%, #d8b848 72%, #f0d060 82%, #c8a030 100%);
}
.face::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 5px);
  pointer-events: none; z-index: 0;
}
.front { opacity: 1; transform: scale(1); z-index: 2; }
.back  { opacity: 0; transform: scale(0.93); z-index: 1; pointer-events: none; }
.scene.flipped .front { opacity: 0; transform: scale(0.93); z-index: 1; pointer-events: none; }
.scene.flipped .back  { opacity: 1; transform: scale(1); z-index: 2; pointer-events: auto; }

.flip-bar {
  width: 100%; padding: 11px 0;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  cursor: pointer; touch-action: manipulation;
  border: none; outline: none;
  background: rgba(26,18,8,0.08);
  border-top: 1px solid rgba(26,18,8,0.2);
  flex-shrink: 0; z-index: 20; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.flip-bar span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(15,10,2,0.55);
}

/* FRONT */
.front-main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 44px 32px 20px; position: relative; z-index: 1; pointer-events: none;
}
.signature {
  font-family: 'Dancing Script', cursive; font-weight: 700;
  font-size: clamp(42px, 13vw, 56px); color: #1a1208;
  line-height: 1.05; margin-bottom: 20px; text-align: center;
  text-shadow: 1px 2px 4px rgba(255,255,255,0.2);
}
.front-divider {
  width: 55%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(26,18,8,0.4), transparent);
  margin: 0 auto 18px;
}
.title-text {
  font-size: clamp(11px, 3vw, 13px); font-weight: 700;
  letter-spacing: 5px; color: #2a1a08; text-transform: uppercase; text-align: center;
}

/* BACK */
.back-main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px 22px 10px; position: relative; z-index: 1;
}
.back-top { text-align: center; width: 100%; }
.monogram {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(38px, 10vw, 46px); font-weight: 700;
  letter-spacing: 8px; line-height: 1; color: #0a0602; margin-bottom: 0;
}
a {
  display: block; text-decoration: none;
  touch-action: manipulation; cursor: pointer;
  position: relative; z-index: 10;
  -webkit-tap-highlight-color: rgba(26,18,8,0.1);
}
.vcard-label {
  font-size: clamp(7.5px, 2vw, 9px); font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(10,6,2,0.6); padding: 1px 0 0;
  display: block;
}

/* PORTRAIT */
.portrait-wrap {
  margin: 14px auto 18px;
  width: clamp(170px, 52vw, 210px);
  height: clamp(170px, 52vw, 210px);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 2.5px rgba(10,6,2,0.12);
  position: relative;
}
.portrait-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

.back-bottom {
  text-align: center; width: 100%;
}
.divider-bottom {
  width: 50%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(10,6,2,0.3), transparent);
  margin: 0 auto 12px;
}
.social-row {
  display: flex; align-items: center; justify-content: center;
  gap: 11px; margin-bottom: 4px;
}
.icon-btn {
  width: 42px; height: 42px; border-radius: 10px;
  border: 2px solid rgba(10,6,2,0.35); background: rgba(10,6,2,0.06);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.hint {
  font-size: 8.5px; font-weight: 700; letter-spacing: 2px;
  color: rgba(10,6,2,0.5); text-transform: uppercase;
  display: block; pointer-events: none; margin-top: 5px;
}
</style>
</head>
