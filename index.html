  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-1: #c8a84b;
      --gold-2: #f0d060;
      --gold-3: #e8c84a;
      --gold-4: #b8942a;
      --gold-5: #f5e070;
      --dark-bg: #111111;
      --card-dark: #1c1c1c;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--dark-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* subtle background shimmer */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(200,168,75,0.07) 0%, transparent 55%),
                  radial-gradient(ellipse at 70% 80%, rgba(200,168,75,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200,168,75,0.4);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'Cormorant Garamond', serif;
      white-space: nowrap;
      animation: fadeHint 3s ease 1.5s both;
    }

    @keyframes fadeHint {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .scene {
      width: min(320px, 86vw);
      height: min(570px, calc(86vw * 1.78));
      perspective: 1400px;
      cursor: pointer;
      animation: cardEntry 0.8s cubic-bezier(0.2,0.8,0.3,1) both;
    }

    @keyframes cardEntry {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .flipper {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.78s cubic-bezier(0.4, 0.15, 0.2, 1);
      -webkit-transition: -webkit-transform 0.78s cubic-bezier(0.4, 0.15, 0.2, 1);
    }

    .flipper.flipped {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      -moz-backface-visibility: hidden;
      box-shadow:
        0 30px 70px rgba(0,0,0,0.75),
        0 0 0 1px rgba(200,168,75,0.22),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ─── FRONT ─── */
    .front {
      background: linear-gradient(108deg,
        #b8902a 0%,
        #d4aa40 12%,
        #f0d868 26%,
        #f5e888 36%,
        #e8d060 48%,
        #c09030 60%,
        #d8b848 72%,
        #f0d060 82%,
        #c8a030 100%
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 32px;
    }

    /* brushed metal lines */
    .front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 3px,
        rgba(255,255,255,0.045) 3px,
        rgba(255,255,255,0.045) 5px
      );
      pointer-events: none;
    }
    .front::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 8px,
        rgba(0,0,0,0.025) 8px,
        rgba(0,0,0,0.025) 9px
      );
      pointer-events: none;
    }

    .front-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .signature {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(40px, 12vw, 54px);
      font-weight: 700;
      color: #1a1208;
      line-height: 1.05;
      margin-bottom: 20px;
      text-shadow: 1px 2px 4px rgba(255,255,255,0.25), -1px -1px 2px rgba(0,0,0,0.15);
      letter-spacing: -0.5px;
    }

    .front-divider {
      width: 55%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,18,8,0.4), transparent);
      margin: 0 auto 18px;
    }

    .title-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(10px, 2.8vw, 12px);
      letter-spacing: 5px;
      color: #2a1a08;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* ─── BACK ─── */
    .back {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 26px 28px;
      position: relative;
    }

    .back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 10%, #1e1b0f 0%, #0d0d0d 60%);
      pointer-events: none;
      z-index: 0;
      border-radius: 18px;
    }

    .back-top, .back-mid, .back-bottom { position: relative; z-index: 1; }

    /* gold gradient text utility */
    .gold-text {
      background: linear-gradient(135deg, #c8a84b 0%, #f0d060 30%, #e8c84a 50%, #b8942a 70%, #d4aa40 85%, #f5e070 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* TOP: monogram + website */
    .back-top { text-align: center; }

    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(50px, 14vw, 64px);
      font-weight: 300;
      letter-spacing: 8px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .website-link {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(8.5px, 2.4vw, 10.5px);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      display: block;
    }
    .website-link:hover { opacity: 0.75; }

    /* MIDDLE: social + QR */
    .back-mid { text-align: center; width: 100%; }

    .social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .social-handle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(11px, 3vw, 13px);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      border: 1px solid rgba(200,168,75,0.35);
      background: rgba(200,168,75,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: rgba(200,168,75,0.14); border-color: rgba(200,168,75,0.6); }
    .icon-btn:active { background: rgba(200,168,75,0.22); }

    .qr-wrap {
      display: inline-flex;
      text-decoration: none;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .qr-box {
      width: clamp(96px, 26vw, 114px);
      height: clamp(96px, 26vw, 114px);
      background: #f5e888;
      border-radius: 9px;
      padding: 7px;
      box-shadow: 0 6px 24px rgba(200,168,75,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s;
    }
    .qr-wrap:hover .qr-box { box-shadow: 0 8px 30px rgba(200,168,75,0.45); }

    .qr-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8.5px;
      letter-spacing: 2px;
      color: rgba(200,168,75,0.45);
      text-transform: uppercase;
    }

    /* BOTTOM: divider + phone + email */
    .back-bottom { text-align: center; width: 100%; }

    .gold-divider {
      width: 38%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,168,75,0.35), transparent);
      margin: 0 auto 16px;
    }

    .phone-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 20px;
      border-radius: 40px;
      border: 1px solid rgba(200,168,75,0.32);
      background: rgba(200,168,75,0.05);
      text-decoration: none;
      margin-bottom: 11px;
      transition: background 0.2s, border-color 0.2s;
    }
    .phone-btn:hover { background: rgba(200,168,75,0.12); border-color: rgba(200,168,75,0.55); }
    .phone-btn:active { background: rgba(200,168,75,0.2); }

    .phone-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .email-link {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(7.5px, 2.1vw, 9.5px);
      letter-spacing: 0.4px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .email-link:hover { opacity: 0.7; }
  </style>
</head>
